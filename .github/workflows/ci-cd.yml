name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  security:
    name: Security scans
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan secrets (trufflehog)
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

      - name: Audit Python deps
        working-directory: Backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit
          python -m pip-audit --strict -r requirements.txt || echo "Ignoring minor audit failures for now"

  test-backend:
    name: Test backend
    runs-on: ubuntu-latest
    needs: security
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        working-directory: Backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Tests
        working-directory: Backend
        run: python -m pytest -q

  build-frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    needs: security
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install and build
        working-directory: Frontend
        run: |
          npm install --legacy-peer-deps
          npm run build

  build-images:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Verify DockerHub secrets
        id: secrets
        env:
          DH_USER: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          if [ -z "$DH_USER" ] || [ "${{ github.event_name }}" != "push" ] || [ "${{ github.ref }}" != "refs/heads/main" ]; then
            echo "push=false" >> $GITHUB_OUTPUT
            echo "::notice::Build only (no push). Set DOCKERHUB_USERNAME and DOCKERHUB_TOKEN in repository secrets to enable push."
          else
            echo "push=true" >> $GITHUB_OUTPUT
          fi

      - name: Login to DockerHub
        if: steps.secrets.outputs.push == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build backend (and push if enabled)
        uses: docker/build-push-action@v6
        with:
          context: ./Backend
          push: ${{ steps.secrets.outputs.push == 'true' }}
          load: ${{ steps.secrets.outputs.push != 'true' }}
          tags: |
            ${{ steps.secrets.outputs.push == 'true' && format('{0}/projet-cloud-backend:latest', secrets.DOCKERHUB_USERNAME) || 'projet-cloud-backend:ci' }}

      - name: Build frontend (and push if enabled)
        uses: docker/build-push-action@v6
        with:
          context: ./Frontend
          push: ${{ steps.secrets.outputs.push == 'true' }}
          load: ${{ steps.secrets.outputs.push != 'true' }}
          tags: |
            ${{ steps.secrets.outputs.push == 'true' && format('{0}/projet-cloud-frontend:latest', secrets.DOCKERHUB_USERNAME) || 'projet-cloud-frontend:ci' }}

      - name: Scan informative image vulnerabilities (HIGH + CRITICAL)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.secrets.outputs.push == 'true' && format('{0}/projet-cloud-backend:latest', secrets.DOCKERHUB_USERNAME) || 'projet-cloud-backend:ci' }}
          severity: HIGH,CRITICAL
          exit-code: '0'
          ignore-unfixed: true

  push-ecr:
    name: Push images to AWS ECR
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'eu-west-1' }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify AWS ECR config
        id: ecr-config
        env:
          AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
        run: |
          if [ -z "$AWS_ROLE_TO_ASSUME" ]; then
            echo "push=false" >> $GITHUB_OUTPUT
            echo "::notice::ECR disabled. Set AWS_ROLE_TO_ASSUME to enable ECR push."
          else
            echo "push=true" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS credentials via OIDC
        if: steps.ecr-config.outputs.push == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create ECR repositories if needed
        if: steps.ecr-config.outputs.push == 'true'
        run: |
          aws ecr describe-repositories --repository-names projet-cloud-backend --region "$AWS_REGION" >/dev/null 2>&1 || aws ecr create-repository --repository-name projet-cloud-backend --region "$AWS_REGION" >/dev/null
          aws ecr describe-repositories --repository-names projet-cloud-frontend --region "$AWS_REGION" >/dev/null 2>&1 || aws ecr create-repository --repository-name projet-cloud-frontend --region "$AWS_REGION" >/dev/null

      - name: Login to Amazon ECR
        if: steps.ecr-config.outputs.push == 'true'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build backend and push ECR
        if: steps.ecr-config.outputs.push == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./Backend
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/projet-cloud-backend:latest

      - name: Build frontend and push ECR
        if: steps.ecr-config.outputs.push == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./Frontend
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/projet-cloud-frontend:latest
