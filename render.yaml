services:
  - type: web_service
    name: credit-scoring-backend
    env: docker
    plan: starter
    region: oregon
    branch: main
    dockerfilePath: Backend/Dockerfile
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        value: ""
      - key: JWT_SECRET
        value: ""
      - key: GOOGLE_CLIENT_ID
        value: ""
      - key: API_KEY
        value: changeme
      - key: AWS_REGION
        value: ""
      - key: AWS_ACCESS_KEY_ID
        value: ""
      - key: AWS_SECRET_ACCESS_KEY
        value: ""
      - key: AWS_ACCOUNT_ID
        value: ""
      - key: MODEL_S3_KEY
        value: ""
      - key: MODEL_S3_BUCKET
        value: ""
      - key: UPLOAD_DIR
        value: "/tmp/uploads"
      - key: CORS_ORIGINS
        value: "http://localhost:4200,https://your-frontend.onrender.com"
